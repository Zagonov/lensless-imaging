defaults:
  - model: leadmm5_pre_post
  - writer: cometml
  - metrics: main
  - datasets: digicam_mirflickr
  - dataloader: main
  - transforms: main
  - _self_

optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4

lr_scheduler: null

loss_function:
  _target_: src.loss.ReconstructionLoss
  lambda_mse: 1
  lambda_lpips: 0.1

trainer:
  log_step: 10
  image_log_step: 100
  eval_step: 500
  eval_max_batches: 50
  final_eval: true
  final_eval_max_batches: -1
  total_steps: 20000
  save_step: 200
  device_tensors: ["lensless", "lensed", "lensed_roi", "psf", "has_lensed"]
  resume_from: null
  from_pretrained: null
  device: auto
  override: false
  monitor: "max test_PSNR"
  early_stop: ${trainer.total_steps}
  save_dir: "saved"
  seed: 1
  max_grad_norm: null

writer:
  run_name: "leadmm5_pre_post"
